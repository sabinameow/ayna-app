services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      PORT: 8000
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: celery -A backend.app.celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_started
    profiles:
      - workers

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: celery -A backend.app.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_started
    profiles:
      - workers

volumes:
  redis_data:
